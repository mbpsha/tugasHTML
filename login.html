<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f5ff;
            --magenta: #ff00cc;
            --lime: #aaff00;
            --yellow: #ffe600;
            --bg: #080b14;
            --surface: rgba(0,245,255,0.04);
            --border: rgba(0,245,255,0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Grid background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,245,255,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,245,255,0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            perspective: 400px;
            z-index: 0;
        }

        /* Glow blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.18;
            z-index: 0;
            animation: blobMove 8s ease-in-out infinite alternate;
        }
        .blob-1 { width: 400px; height: 400px; background: var(--cyan); top: -100px; left: -100px; }
        .blob-2 { width: 350px; height: 350px; background: var(--magenta); bottom: -80px; right: -80px; animation-delay: -4s; }
        .blob-3 { width: 250px; height: 250px; background: var(--lime); top: 50%; left: 60%; animation-delay: -2s; }

        @keyframes blobMove {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(30px, 40px) scale(1.1); }
        }

        /* Card */
        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            padding: 48px 40px;
            background: var(--surface);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 4px;
            box-shadow:
                0 0 0 1px rgba(0,245,255,0.06),
                0 0 40px rgba(0,245,255,0.08),
                inset 0 1px 0 rgba(255,255,255,0.06);
            animation: fadeIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
        }

        /* Corner decorations */
        .card::before, .card::after {
            content: '';
            position: absolute;
            width: 20px; height: 20px;
            border-color: var(--cyan);
            border-style: solid;
        }
        .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Header */
        .header { text-align: center; margin-bottom: 36px; }

        .logo {
            display: inline-block;
            font-family: 'Orbitron', monospace;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.4em;
            color: var(--cyan);
            background: rgba(0,245,255,0.08);
            border: 1px solid rgba(0,245,255,0.25);
            padding: 6px 16px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--cyan);
        }

        h2 {
            font-family: 'Orbitron', monospace;
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        h2 span {
            color: var(--cyan);
            text-shadow: 0 0 20px var(--cyan);
        }

        .sub {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            margin-top: 8px;
            letter-spacing: 0.05em;
        }

        /* Form */
        .field { margin-bottom: 18px; }

        label {
            display: block;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--cyan);
            margin-bottom: 8px;
            opacity: 0.7;
        }

        input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0,245,255,0.18);
            border-radius: 3px;
            padding: 13px 16px;
            font-family: 'Exo 2', sans-serif;
            font-size: 15px;
            color: #fff;
            outline: none;
            transition: all 0.2s;
        }
        input::placeholder { color: rgba(255,255,255,0.2); }
        input:focus {
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(0,245,255,0.1), 0 0 15px rgba(0,245,255,0.1);
            background: rgba(0,245,255,0.04);
        }

        /* Button */
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 3px;
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 8px;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
            background: linear-gradient(135deg, var(--cyan), #0099cc);
            color: #000;
            box-shadow: 0 0 20px rgba(0,245,255,0.3);
        }

        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.15) 50%, transparent 100%);
            transform: translateX(-100%);
            transition: transform 0.4s;
        }
        .btn:hover::before { transform: translateX(100%); }
        .btn:hover {
            box-shadow: 0 0 35px rgba(0,245,255,0.5);
            transform: translateY(-1px);
        }
        .btn:active { transform: translateY(0); }

        /* Footer */
        .footer {
            text-align: center;
            margin-top: 24px;
            font-size: 13px;
            color: rgba(255,255,255,0.3);
        }
        .footer a {
            color: var(--magenta);
            text-decoration: none;
            font-weight: 500;
            text-shadow: 0 0 10px var(--magenta);
            transition: opacity 0.2s;
        }
        .footer a:hover { opacity: 0.8; }

        /* Scan line effect */
        .scanline {
            position: fixed;
            inset: 0;
            z-index: 2;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(0,0,0,0.03) 2px,
                rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="scanline"></div>

    <div class="card">
        <div class="header">
            <div class="logo">◈ SISTEM AUTH ◈</div>
            <h2>MASUK KE<br><span>SISTEM</span></h2>
            <p class="sub">Verifikasi identitas diperlukan</p>
        </div>

        <div class="field">
            <label>▸ Username</label>
            <input type="text" id="logUser" placeholder="Masukkan username">
        </div>
        <div class="field">
            <label>▸ Password</label>
            <input type="password" id="logPass" placeholder="Masukkan password">
        </div>
        <button class="btn" onclick="prosesLogin()">▶ MASUK SEKARANG</button>

        <div class="footer">
            Belum terdaftar? <a href="register.html">Buat akun baru →</a>
        </div>
    </div>

    <script>
        function prosesLogin() {
            const user = document.getElementById('logUser').value;
            const pass = document.getElementById('logPass').value;
            const savedUser = localStorage.getItem('dataUsername');
            const savedPass = localStorage.getItem('dataPassword');
            if (user === savedUser && pass === savedPass) {
                alert('Login Berhasil!');
                window.location.href = 'landing.html';
            } else {
                alert('Username atau Password salah!');
            }
        }

        // Enter key support
        document.addEventListener('keydown', e => { if (e.key === 'Enter') prosesLogin(); });
    </script>
</body>
</html>
