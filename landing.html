<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Landing Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --cyan: #00f5ff;
            --magenta: #ff00cc;
            --lime: #aaff00;
            --orange: #ff6b00;
            --bg: #080f09;
            --surface: rgba(170,255,0,0.04);
            --border: rgba(170,255,0,0.2);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Exo 2', sans-serif;
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(170,255,0,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(170,255,0,0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.15;
            z-index: 0;
            animation: blobMove 10s ease-in-out infinite alternate;
        }
        .blob-1 { width: 500px; height: 500px; background: var(--lime); top: -150px; left: -100px; }
        .blob-2 { width: 350px; height: 350px; background: var(--cyan); bottom: -80px; right: -80px; animation-delay: -4s; }
        .blob-3 { width: 250px; height: 250px; background: var(--orange); top: 30%; right: 20%; animation-delay: -7s; }

        @keyframes blobMove {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(50px, -40px) scale(1.15); }
        }

        /* Particles */
        .particles {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            border-radius: 50%;
            animation: floatUp linear infinite;
            opacity: 0;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: 1; }
            90%  { opacity: 1; }
            100% { transform: translateY(-20px) scale(1); opacity: 0; }
        }

        .card {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
            padding: 56px 44px;
            background: var(--surface);
            backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 4px;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(170,255,0,0.05),
                0 0 60px rgba(170,255,0,0.08),
                inset 0 1px 0 rgba(255,255,255,0.05);
            animation: fadeIn 0.7s cubic-bezier(0.22,1,0.36,1) both;
        }

        .card::before, .card::after {
            content: '';
            position: absolute;
            width: 24px; height: 24px;
            border-color: var(--lime);
            border-style: solid;
        }
        .card::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
        .card::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to   { opacity: 1; transform: scale(1); }
        }

        /* Status badge */
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(170,255,0,0.08);
            border: 1px solid rgba(170,255,0,0.25);
            border-radius: 100px;
            padding: 6px 18px;
            font-family: 'Orbitron', monospace;
            font-size: 10px;
            letter-spacing: 0.2em;
            color: var(--lime);
            text-shadow: 0 0 8px var(--lime);
            margin-bottom: 32px;
        }
        .dot {
            width: 8px; height: 8px;
            background: var(--lime);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--lime);
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.8); }
        }

        /* Avatar */
        .avatar {
            width: 90px; height: 90px;
            background: linear-gradient(135deg, var(--lime), #55cc00);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-bottom: 24px;
            box-shadow: 0 0 0 6px rgba(170,255,0,0.1), 0 0 40px rgba(170,255,0,0.25);
            animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.2s both;
        }
        @keyframes popIn {
            from { opacity: 0; transform: scale(0.5) rotate(-20deg); }
            to   { opacity: 1; transform: scale(1) rotate(0deg); }
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .username {
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: 900;
            color: var(--lime);
            text-shadow: 0 0 25px rgba(170,255,0,0.6);
            letter-spacing: -0.5px;
            margin-bottom: 16px;
            animation: glitch 4s ease-in-out infinite;
        }

        @keyframes glitch {
            0%, 90%, 100% { text-shadow: 0 0 25px rgba(170,255,0,0.6); transform: none; }
            92% { text-shadow: 3px 0 var(--cyan), -3px 0 var(--magenta), 0 0 25px rgba(170,255,0,0.6); }
            94% { text-shadow: -3px 0 var(--cyan), 3px 0 var(--magenta), 0 0 25px rgba(170,255,0,0.6); }
        }

        .desc {
            font-size: 14px;
            color: rgba(255,255,255,0.35);
            line-height: 1.7;
            max-width: 300px;
            margin: 0 auto 36px;
        }

        /* Stats row */
        .stats {
            display: flex;
            gap: 1px;
            margin-bottom: 36px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .stat {
            flex: 1;
            padding: 14px 12px;
            background: rgba(0,0,0,0.3);
            text-align: center;
        }
        .stat-val {
            font-family: 'Orbitron', monospace;
            font-size: 16px;
            font-weight: 700;
            color: var(--lime);
            text-shadow: 0 0 10px rgba(170,255,0,0.5);
        }
        .stat-label {
            font-size: 10px;
            color: rgba(255,255,255,0.3);
            letter-spacing: 0.08em;
            margin-top: 4px;
        }

        /* Buttons */
        .btn-group { display: flex; flex-direction: column; gap: 12px; }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 3px;
            font-family: 'Orbitron', monospace;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.15em;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: all 0.2s;
        }
        .btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: translateX(-100%);
            transition: transform 0.4s;
        }
        .btn:hover::before { transform: translateX(100%); }

        .btn-primary {
            background: linear-gradient(135deg, var(--lime), #66cc00);
            color: #000;
            box-shadow: 0 0 20px rgba(170,255,0,0.3);
        }
        .btn-primary:hover {
            box-shadow: 0 0 35px rgba(170,255,0,0.5);
            transform: translateY(-1px);
        }

        .btn-ghost {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.4);
        }
        .btn-ghost:hover {
            border-color: rgba(255,0,204,0.4);
            color: var(--magenta);
        }
        .btn:active { transform: translateY(0); }

        .scanline {
            position: fixed;
            inset: 0;
            z-index: 2;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
    <div class="particles" id="particles"></div>
    <div class="scanline"></div>

    <div class="card">
        <div class="status"><div class="dot"></div>AKSES DIBERIKAN</div>
        <div class="avatar">⚡</div>
        <h1>Selamat Datang</h1>
        <div class="username" id="pesanSambut">—</div>
        <p class="desc">Anda berhasil masuk ke sistem. Ini adalah halaman rahasia setelah berhasil login.</p>

        <div class="stats">
            <div class="stat">
                <div class="stat-val" id="loginTime">—</div>
                <div class="stat-label">Login Jam</div>
            </div>
            <div class="stat">
                <div class="stat-val" style="color: var(--cyan); text-shadow: 0 0 10px rgba(0,245,255,0.5);">AKTIF</div>
                <div class="stat-label">Status</div>
            </div>
            <div class="stat">
                <div class="stat-val" style="color: var(--magenta); text-shadow: 0 0 10px rgba(255,0,204,0.5);">LV.1</div>
                <div class="stat-label">Level</div>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-primary">◈ JELAJAHI DASHBOARD</button>
            <button class="btn btn-ghost" onclick="prosesLogout()">⏏ KELUAR DARI SISTEM</button>
        </div>
    </div>

    <script>
        const user = localStorage.getItem('dataUsername');
        if (!user) {
            alert('Anda harus login terlebih dahulu!');
            window.location.href = 'login.html';
        } else {
            document.getElementById('pesanSambut').innerText = user.toUpperCase();
            const now = new Date();
            document.getElementById('loginTime').innerText =
                now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
        }

        function prosesLogout() {
            alert('Anda telah keluar.');
            window.location.href = 'login.html';
        }

        // Generate floating particles
        const container = document.getElementById('particles');
        const colors = ['#aaff00','#00f5ff','#ff00cc','#ffe600','#ff6b00'];
        for (let i = 0; i < 30; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.background = colors[Math.floor(Math.random() * colors.length)];
            p.style.width = p.style.height = (Math.random() * 3 + 1) + 'px';
            p.style.animationDuration = (Math.random() * 8 + 6) + 's';
            p.style.animationDelay = (Math.random() * 8) + 's';
            p.style.boxShadow = `0 0 6px ${p.style.background}`;
            container.appendChild(p);
        }
    </script>
</body>
</html>
